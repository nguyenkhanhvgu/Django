version: '3.8'

services:
  # Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - django-app-1
      - django-app-2
      - django-app-3
    networks:
      - app-network

  # Django Application Instances
  django-app-1:
    build: .
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres-primary:5432/myapp
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=myapp.settings.production
    depends_on:
      - postgres-primary
      - redis
    networks:
      - app-network
    volumes:
      - static-volume:/app/static
      - media-volume:/app/media

  django-app-2:
    build: .
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres-primary:5432/myapp
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=myapp.settings.production
    depends_on:
      - postgres-primary
      - redis
    networks:
      - app-network
    volumes:
      - static-volume:/app/static
      - media-volume:/app/media

  django-app-3:
    build: .
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres-primary:5432/myapp
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=myapp.settings.production
    depends_on:
      - postgres-primary
      - redis
    networks:
      - app-network
    volumes:
      - static-volume:/app/static
      - media-volume:/app/media

  # Database - Primary
  postgres-primary:
    image: postgres:13
    environment:
      - POSTGRES_DB=myapp
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - app-network
    ports:
      - "5432:5432"

  # Database - Read Replica
  postgres-replica:
    image: postgres:13
    environment:
      - POSTGRES_DB=myapp
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_MASTER_SERVICE=postgres-primary
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    networks:
      - app-network
    depends_on:
      - postgres-primary

  # Redis Cache
  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    networks:
      - app-network
    command: redis-server --appendonly yes

  # Celery Worker
  celery-worker:
    build: .
    command: celery -A myapp worker -l info
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres-primary:5432/myapp
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=myapp.settings.production
    depends_on:
      - postgres-primary
      - redis
    networks:
      - app-network
    volumes:
      - media-volume:/app/media

  # Celery Beat (Scheduler)
  celery-beat:
    build: .
    command: celery -A myapp beat -l info
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres-primary:5432/myapp
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=myapp.settings.production
    depends_on:
      - postgres-primary
      - redis
    networks:
      - app-network

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - app-network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - app-network

  # Log Aggregation - Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.14.0
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - app-network

  # Log Processing - Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:7.14.0
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
    networks:
      - app-network

  # Log Visualization - Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:7.14.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - app-network

volumes:
  postgres-primary-data:
  postgres-replica-data:
  redis-data:
  static-volume:
  media-volume:
  prometheus-data:
  grafana-data:
  elasticsearch-data:

networks:
  app-network:
    driver: bridge