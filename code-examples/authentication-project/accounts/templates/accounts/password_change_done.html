{% extends 'accounts/base.html' %}

{% block title %}Password Changed - Authentication System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Password Changed Successfully</h4>
            </div>
            <div class="card-body text-center">
                <div class="mb-4">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                </div>
                <h5>Your password has been changed successfully!</h5>
                <p class="text-muted">Your account is now secured with your new password.</p>
                
                <div class="mt-4">
                    <a href="{% url 'accounts:dashboard' %}" class="btn btn-primary">
                        Return to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
