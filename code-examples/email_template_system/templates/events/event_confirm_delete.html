{% extends 'base.html' %}
{% block title %}Delete Event{% endblock %}
{% block content %}
<h1>Delete {{ event.name }}?</h1>
<form method="post">{% csrf_token %}
<button type="submit" class="btn btn-danger">Delete</button>
<a href="{% url 'event_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
